[[stack]]
name = "git-mcp-klartext"
description = "MCP server for brand-aware copywriting — voice DNA, brand contexts, platform templates"
deploy = true
tags = ["mcp"]

[stack.config]
server_id = "nebula-1"
git_provider = "github.com"
repo = "CaseyRo/mcp-klartext"
branch = "main"
environment = """
MCP_API_KEY = [[MCP_KLARTEXT_API_KEY]]
"""
