[[stack]]
name = "git-mcp-klartext"
description = "MCP server for brand-aware copywriting — voice DNA, brand contexts, platform templates"
deploy = true
tags = ["mcp"]

[stack.config]
server_id = "ubuntu-smurf-mirror"
git_provider = "github.com"
repo = "CaseyRo/mcp-klartext"
branch = "main"
environment = """
MCP_KLARTEXT_API_KEY = [[MCP_KLARTEXT_API_KEY]]
MCP_KLARTEXT_PUBLIC_URL = https://mcp-klartext.cdit-dev.de
KEYCLOAK_ISSUER = https://auth.cdit-works.de/realms/cdit-mcp
KEYCLOAK_AUDIENCE = mcp-klartext
"""
