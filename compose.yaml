services:
  mcp-klartext:
    image: ghcr.io/caseyro/mcp-klartext:latest
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - MCP_API_KEY=${MCP_API_KEY:-}
      - FASTMCP_HOME=/data/fastmcp
    volumes:
      - fastmcp-data:/data/fastmcp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  fastmcp-data:
