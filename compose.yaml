services:
  mcp-klartext:
    build: .
    restart: unless-stopped
    ports:
      - "8008:8000"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - MCP_KLARTEXT_API_KEY=${MCP_KLARTEXT_API_KEY:-}
      - MCP_KLARTEXT_PUBLIC_URL=${MCP_KLARTEXT_PUBLIC_URL:-https://mcp-klartext.cdit-dev.de}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-https://auth.cdit-works.de/realms/cdit-mcp}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-mcp-klartext}
